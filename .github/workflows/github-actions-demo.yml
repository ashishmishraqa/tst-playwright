name: Test Automation Pipeline

on:
#  push:
#    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 9 * * 4"  # Every Thursday at 9:00 AM UTC
  workflow_dispatch:
    inputs:
      worker_mode:
        description: 'Choose the worker mode for test execution'
        required: true
        default: 'auto'
        options:
          - auto
          - 1
# Required permissions for secure AWS authentication via OIDC
permissions:
  id-token: write
  contents: read
  issues: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.13]
        test-suite: [smoke, regression]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps

      - name: Clean up IDLE configuration
        run: rm -rf ~/.idlerc


      - name: Install Allure CLI
        run: |
            sudo apt-get update
            sudo apt-get install -y default-jre
            wget https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
            tar -zxvf allure-2.27.0.tgz -C /opt/
            sudo ln -s /opt/allure-2.27.0/bin/allure /usr/bin/allure

      - name: Configure AWS Credentials
        if: always()
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1 # Change to your AWS region if different

      # Downloads the 'history' directory from your past execution to maintain trends
      - name: Fetch Past Allure History
        if: always()
        run: |
          aws s3 cp s3://${{ secrets.AWS_S3_BUCKET }}/${{ matrix.test-suite }}/history/ ./allure-results/history/ --recursive || true


      - name: Run ${{ matrix.test-suite }} tests
        env:
          PYTEST_ADDOPTS: "-n auto --dist loadscope --alluredir=allure-results"
        run: |
          # Use the worker mode specified in the workflow dispatch input, or default to 'auto'
          WORKER_MODE="${{ github.event.inputs.worker_mode || 'auto' }}"
          
          pytest -m ${{ matrix.test-suite }} \
            -n auto \
            --dist loadscope \
            --alluredir=allure-results \
            --junitxml=junit-${{ matrix.test-suite }}.xml

      - name: Generate Allure Report
        if: always()
        run: allure generate allure-results -o allure-report --clean

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.test-suite }}-py${{ matrix.python-version }}
          path: allure-report/

            # Upload the static directory contents directly into the website S3 bucket path
      - name: Deploy Allure Report to S3 Website
        if: always()
        run: |
          aws s3 sync allure-report/ s3://${{ secrets.AWS_S3_BUCKET }}/${{ matrix.test-suite }}/ --delete

      - name: Upload Allure Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.test-suite }}-py${{ matrix.python-version }}
          path: allure-report/

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-reports-${{ matrix.test-suite }}-py${{ matrix.python-version }}
          path: junit-*.xml

      - name: Comment PR with Test Results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const junit = fs.readFileSync('junit-${{ matrix.test-suite }}.xml', 'utf8');
            const passed = (junit.match(/tests="(\d+)"/g) || []).length;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Tests completed for ${{ matrix.test-suite }} suite`
            });
