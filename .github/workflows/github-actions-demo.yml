name: Test Automation Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 9 * * 4"  # Daily 2 AM
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]
        test-suite: [smoke, regression]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps

      - name: Run ${{ matrix.test-suite }} tests (Parallel)
        run: |
          pytest -m ${{ matrix.test-suite }} \
            -n auto \
            --dist loadscope \
            --alluredir=allure-results \
            --junitxml=junit-${{ matrix.test-suite }}.xml

      - name: Generate Allure Report
        if: always()
        run: allure generate allure-results -o allure-report --clean

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.test-suite }}-py${{ matrix.python-version }}
          path: allure-report/

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-reports-${{ matrix.test-suite }}-py${{ matrix.python-version }}
          path: junit-*.xml

      - name: Comment PR with Test Results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const junit = fs.readFileSync('junit-${{ matrix.test-suite }}.xml', 'utf8');
            const passed = (junit.match(/tests="(\d+)"/g) || []).length;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Tests completed for ${{ matrix.test-suite }} suite`
            });