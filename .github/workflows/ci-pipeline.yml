name: Test Automation Pipeline

on:
  pull_request:
    branches:
      - master
  schedule:
    - cron: '0 9 * * 4'  # Thursday 9 AM UTC
  workflow_dispatch:
    inputs:
      worker_mode:
        description: Choose the worker mode for test execution
        required: true
        default: auto
        type: choice
        options:
          - auto
          - '1'

permissions:
  id-token: write
  contents: read
  issues: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      AWS_SMOKE_SECRET_NAME: ${{ secrets.AWS_SMOKE_SECRET_NAME }}
      BASE_URL: ${{ secrets.BASE_URL }}
      BASE_URL_API: ${{ vars.BASE_URL_API }}
      GO_REST_TOKEN: ${{ vars.GO_REST_TOKEN }}

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.13'
        test-suite:
          - smoke
          - regression

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Generate Run Timestamp
        id: timestamp
        run: echo "RUN_DATE=$(date +'%Y-%m-%d_%H-%M')" >> "$GITHUB_OUTPUT"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Build Automation Docker Image
        run: |
          docker build -t test-automation:latest .

      - name: Smoke Test AWS Secrets Manager Access
        run: |
          docker run --rm \
            -e AWS_ACCESS_KEY_ID \
            -e AWS_SECRET_ACCESS_KEY \
            -e AWS_SESSION_TOKEN \
            -e AWS_REGION \
            -e AWS_DEFAULT_REGION \
            -e AWS_SMOKE_SECRET_NAME \
            test-automation:latest \
            python -c "
          from ecart.utilities.secret_manager import SecretsManager
          import os
          secret = os.environ['AWS_SMOKE_SECRET_NAME']
          SecretsManager().get_secret(secret)
          print(f'Secrets Manager verified: {secret}')"

      - name: Run Tests inside Docker Container
        id: tests
        continue-on-error: true
        run: |
          WORKER_MODE="${{ github.event.inputs.worker_mode || 'auto' }}"
          docker run --rm \
            -e AWS_ACCESS_KEY_ID \
            -e AWS_SECRET_ACCESS_KEY \
            -e AWS_SESSION_TOKEN \
            -e AWS_REGION=us-east-1 \
            -e AWS_DEFAULT_REGION=us-east-1 \
            -v ${{ github.workspace }}/allure-results:/automation/allure-results \
            -v ${{ github.workspace }}/allure-report:/automation/allure-report \
            test-automation:latest \
            pytest ecart/tests \
            -m ${{ matrix.test-suite }} \
            -n $WORKER_MODE \
            --dist loadscope \
            --alluredir=allure-results \
            --junitxml=/automation/output/junit-${{ matrix.test-suite }}.xml

      - name: Generate Allure Report inside Docker Container
        if: always()
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/allure-results:/automation/allure-results \
            -v ${{ github.workspace }}/allure-report:/automation/allure-report \
            test-automation:latest \
            allure generate allure-results \
            -o allure-report \
            --clean

      - name: Upload Allure Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.test-suite }}
          path: allure-report
          retention-days: 30

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-xml-${{ matrix.test-suite }}
          path: output/junit-${{ matrix.test-suite }}.xml
          retention-days: 30

      - name: Deploy Allure Report to S3 Website (Date-wise)
        if: always()
        run: |
          aws s3 sync \
            allure-report/ \
            s3://${{ secrets.AWS_S3_BUCKET }}/${{ matrix.test-suite }}/${{ steps.timestamp.outputs.RUN_DATE }}/ \
            --delete

      - name: Fail Workflow if Tests Failed
        if: steps.tests.outcome == 'failure'
        run: |
          echo "One or more tests failed."
          exit 1